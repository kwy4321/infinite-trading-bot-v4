# push / PR 시 Python 문법·import 검사 (서버 배포 전에 깨진 코드 차단)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 서버 venv 기준 — 3.10 (3.9는 PEP604 `|` 타입 문법 미지원)
        python-version: ["3.10"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Syntax check (compileall)
        run: python -m compileall -q .

      - name: Import check
        run: python -c "import main; print('import main OK')"

      - name: Formatter smoke test
        run: python scripts/smoke_formatters.py

      - name: Session fill logic test
        run: python scripts/test_session_fill.py

      - name: Briefing schedule test
        run: python scripts/test_briefing_schedule.py
