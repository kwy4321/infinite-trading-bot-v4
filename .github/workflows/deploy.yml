# main push 시 CI 통과 후에만 서버 배포
name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install --no-cache-dir -r requirements.txt
      - run: python -m compileall -q .
      - run: python -c "import main; print('import main OK')"

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH/#\~/$HOME}"
            echo "Deploy path: $DEPLOY_PATH"
            if [[ ! -d "$DEPLOY_PATH" ]]; then
              echo "ERROR: directory not found: $DEPLOY_PATH"
              echo "Set GitHub Secret DEPLOY_PATH=/home/ubuntu/infinite-trading-bot-v4"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            bash scripts/deploy.sh
